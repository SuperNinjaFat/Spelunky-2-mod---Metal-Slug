name: Create Release Zip

on:
    push:
        tags:
            - 'v*'

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Repo
              uses: actions/checkout@v4
            
            - name: Remove development files
              run: |
                rm -f .gitattributes
                rm -rf .github

            - name: Zip up files
              run: |
                zip -r MetalSlugHeavyMacinegun-${{ github.ref_name }}.zip * .[^.]*
            
            - name: Create Release with uploaded asset
              uses: softprops/action-gh-release@v2
              with:
                files: MetalSlugHeavyMacinegun-${{ github.ref_name }}.zip